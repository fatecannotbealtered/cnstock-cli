name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.23', '1.24', '1.25']
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Tidy modules
        run: go mod tidy

      - name: Check formatting
        if: runner.os == 'Linux'
        run: test -z "$(gofmt -l .)"

      - name: Lint
        if: runner.os == 'Linux'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -race -v ./...

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          go build -o cnstock-cli-test ./cmd/cnstock-cli
          ./cnstock-cli-test --help

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          go build -o cnstock-cli-test.exe ./cmd/cnstock-cli
          ./cnstock-cli-test.exe --help
